<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>service_hub.html</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* 全局規範：15px, 不加粗, LINE 原生風格, 扁平化 */
    body { font-family: -apple-system, sans-serif; margin: 0; background: #F4F4F4; color: #333333; font-size: 15px; font-weight: 400; padding-bottom: 90px; -webkit-font-smoothing: antialiased; }
    .app-container { max-width: 450px; margin: 0 auto; min-height: 100vh; position: relative; }
    header { background: #06C755; color: white; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
    .header-title { font-size: 17px; font-weight: 400; }
    .section-title { padding: 20px 20px 10px 20px; font-size: 15px; color: #999999; font-weight: 400; }
    .menu-list { background: #FFFFFF; border-bottom: 1px solid #EEEEEE; }
    .menu-item { padding: 20px; border-bottom: 1px solid #F9F9F9; cursor: pointer; display: flex; flex-direction: column; color: inherit; text-decoration: none; }
    .menu-item:last-child { border-bottom: none; }
    .menu-item h3 { margin: 0 0 6px 0; font-size: 15px; font-weight: 400; color: #333333; }
    .menu-item p { margin: 0; font-size: 14px; color: #999999; line-height: 1.4; font-weight: 400; }
    .btn-action { width: calc(100% - 40px); margin: 20px; padding: 16px; background: #06C755; color: white; border: none; font-size: 16px; cursor: pointer; text-align: center; border-radius: 8px; display: block; font-weight: 400; }
    nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: #FFFFFF; display: flex; border-top: 1px solid #EEEEEE; height: 80px; left: 50%; transform: translateX(-50%); z-index: 1000; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #4A5568; cursor: pointer; }
    .nav-item.active { color: #1A202C; }
    .nav-item.active .icon-box { border: 1.5px solid #1A202C; border-radius: 10px; padding: 6px; display: flex; align-items: center; justify-content: center; }
    .nav-text { font-size: 12px; font-weight: 400; margin-top: 4px; }
    .hidden { display: none !important; }
    .diag-box { background: #1A202C; color: #00FF00; padding: 20px; margin: 15px 20px; border-radius: 12px; font-size: 11px; font-family: monospace; white-space: pre-wrap; word-break: break-all; max-height: 300px; overflow-y: auto; font-weight: 400; }
  </style>
</head>
<body>
  <div id="loader" class="fixed inset-0 bg-white z-[9999] flex items-center justify-center">正在開啟服務中心...</div>
  <div class="app-container">
    <header>
      <div class="flex items-center gap-2"><i data-lucide="home" style="width:18px;"></i><span id="brand-name" class="header-title">服務中心</span></div>
      <i id="btn-admin" data-lucide="arrow-left-right" class="hidden" style="cursor:pointer; width:20px;" onclick="location.href='active.html?p='+p"></i>
    </header>
    <div id="diag-panel" class="diag-box hidden"></div>
    <main id="main-content">
      <div id="view-home">
        <div class="section-title">功能選單</div>
        <div class="menu-list">
          <div class="menu-item" onclick="switchView('profile')"><h3>📇 我的商務名片</h3><p>設定您的產業資源，開啟 AI 媒合。</p></div>
          <div class="menu-item" onclick="switchView('activity')"><h3>📅 活動報名</h3><p>查看並參加商圈最新的活動內容。</p></div>
        </div>
      </div>
      <div id="view-activity" class="hidden">
        <div class="section-title">進行中活動</div>
        <div id="act-list" class="menu-list"></div>
      </div>
      <div id="view-profile" class="hidden">
        <div class="section-title">編輯名片</div>
        <div class="bg-white px-5 py-4 border-b border-gray-50"><label class="block text-gray-500 mb-2">姓名</label><input id="f-name" class="w-full border-b border-gray-100 py-2 outline-none"></div>
        <div class="bg-white px-5 py-4 border-b border-gray-50"><label class="block text-gray-500 mb-2">職稱</label><input id="f-job" class="w-full border-b border-gray-100 py-2 outline-none"></div>
        <button class="btn-action" onclick="saveProfile()">儲存同步</button>
      </div>
    </main>
    <nav>
      <div class="nav-item active" id="nav-home" onclick="switchView('home')"><div class="icon-box"><i data-lucide="home"></i></div><span class="nav-text">首頁</span></div>
      <div class="nav-item" id="nav-profile" onclick="switchView('profile')"><i data-lucide="contact"></i><span class="nav-text">名片</span></div>
      <div class="nav-item" id="nav-activity" onclick="switchView('activity')"><i data-lucide="calendar"></i><span class="nav-text">活動</span></div>
    </nav>
  </div>
  <script>
    const LIFF_ID = '2009367829-5bIWGL8O';
    const WORKER_URL = 'https://saas.ares-co2026.workers.dev/';
    let uid = '', p = '';
    async function init() {
      lucide.createIcons();
      p = new URLSearchParams(window.location.search).get('p');
      if (!p) { document.getElementById('loader').innerText = '缺少代碼 p'; return; }
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const profile = await liff.getProfile();
        uid = profile.userId;
        await loadData();
      } catch (err) { console.error(err); }
      finally { document.getElementById('loader').classList.add('hidden'); }
    }
    async function loadData() {
      try {
        const res = await fetch(WORKER_URL, { method:'POST', body: JSON.stringify({ action:'get_service_hub', p, uid }) });
        const result = await res.json();
        if (result.status === 'success') {
          const d = result.data;
          document.getElementById('brand-name').innerText = d.brandName;
          if (d.isAdmin) document.getElementById('btn-admin').classList.remove('hidden');
          renderActs(d.activities);
        } else { showDiag(result.message + '\n' + (result.debug || '')); }
      } catch (e) { showDiag('連線失敗: ' + e.message); }
    }
    function renderActs(list) {
      const container = document.getElementById('act-list');
      if (!list || list.length === 0) { container.innerHTML = '<div class="p-10 text-center text-gray-400">目前無活動</div>'; return; }
      container.innerHTML = list.map(a => `<div class="menu-item"><h3>${a.name}</h3><p>${a.type}</p></div>`).join('');
    }
    function showDiag(msg) {
      const panel = document.getElementById('diag-panel');
      panel.classList.remove('hidden');
      panel.innerText = `[系統診斷]\n${msg}`;
    }
    function switchView(v) {
      document.querySelectorAll('#main-content > div').forEach(el => el.classList.add('hidden'));
      document.getElementById('view-' + v).classList.remove('hidden');
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      document.getElementById('nav-' + v).classList.add('active');
      lucide.createIcons();
    }
    init();
  </script>
</body>
</html>
