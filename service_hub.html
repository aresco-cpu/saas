<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>服務中心</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: -apple-system, sans-serif; margin: 0; background: #f4f4f4; color: #333; padding-bottom: 80px; }
    header { background: #06C755; color: white; padding: 20px 15px; text-align: center; }
    header h2 { margin: 0; font-size: 18px; letter-spacing: 1px; }
    .user-profile { background: white; padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #eee; }
    .user-avatar { width: 55px; height: 55px; border-radius: 50%; margin-right: 12px; background: #eee; object-fit: cover; }
    .user-name { font-weight: bold; font-size: 16px; margin: 0; }
    .user-store { font-size: 12px; color: #06C755; margin: 2px 0 0 0; }
    .container { padding: 12px; }
    .card { background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .card h3 { margin: 0 0 5px 0; font-size: 15px; }
    .card p { margin: 0; font-size: 12px; color: #888; }
    .field-group { margin-bottom: 12px; }
    .field-label { font-size: 12px; color: #666; margin-bottom: 4px; display: block; }
    .field-input, .field-textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; background: #fafafa; }
    .field-textarea { height: 80px; resize: none; }
    .btn-submit { background: #06C755; color: white; border: none; width: 100%; padding: 12px; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; }
    .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #eee; height: 60px; }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #999; cursor: pointer; }
    .nav-btn.active { color: #06C755; font-weight: bold; }
    .match-box { background: #fff; padding: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; color: #444; border-radius: 8px; }
  </style>
</head>
<body>

<header><h2 id="header-store">正在載入...</h2></header>

<div class="user-profile">
  <img id="u-img" class="user-avatar" src="">
  <div class="user-info">
    <p id="u-name" class="user-name">載入中...</p>
    <p id="u-store" class="user-store">📍 驗證店家身分...</p>
  </div>
</div>

<div id="view-home" class="container">
  <div class="card" onclick="switchView('profile')">
    <h3>數位名片設定</h3>
    <p>更新您的個人資訊以利 AI 精準配對。</p>
  </div>
  <div class="card" onclick="switchView('ai')">
    <h3>AI 智能配對</h3>
    <p>自動推薦適合您的商務夥伴。</p>
  </div>
</div>

<div id="view-profile" class="container" style="display:none;">
  <div class="card">
    <div id="profile-form"></div>
    <button class="btn-submit" id="save-btn" onclick="saveProfile()">更新名片資料</button>
  </div>
</div>

<div id="view-ai" class="container" style="display:none;">
  <div id="ai-loading" style="text-align:center; padding:20px; font-size:12px; display:none;">AI 正在媒合中...</div>
  <div id="ai-result" class="match-box"></div>
  <button class="btn-submit" style="background:#333; margin-top:10px;" onclick="getAiMatches()">重新獲取推薦</button>
</div>

<nav class="nav">
  <div class="nav-btn active" id="nav-home" onclick="switchView('home')">首頁</div>
  <div class="nav-btn" id="nav-profile" onclick="switchView('profile')">名片</div>
  <div class="nav-btn" id="nav-ai" onclick="switchView('ai')">配對</div>
</nav>

<script>
  const LIFF_ID = '2009367829-5bIWGL8O';
  const WORKER_URL = 'https://saas.ares-co2026.workers.dev/';
  let uid = '', p = '';

  const config = [
    { id: 'name', label: '姓名', type: 'text' },
    { id: 'job', label: '職稱', type: 'text' },
    { id: 'industry', label: '產業領域', type: 'text' },
    { id: 'resource', label: '我有什麼？(資源)', type: 'textarea' },
    { id: 'need', label: '我找什麼？(需求)', type: 'textarea' }
  ];

  async function init() {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const profile = await liff.getProfile();
    uid = profile.userId;
    document.getElementById('u-img').src = profile.pictureUrl || '';
    document.getElementById('u-name').innerText = profile.displayName;

    const urlParams = new URLSearchParams(window.location.search);
    p = urlParams.get('p');
    if (!p) { document.getElementById('header-store').innerText = '無效連結'; return; }

    renderForm();
    loadData();
  }

  function renderForm() {
    const f = document.getElementById('profile-form');
    config.forEach(c => {
      const g = document.createElement('div');
      g.className = 'field-group';
      g.innerHTML = `<label class="field-label">${c.label}</label>`;
      const i = (c.type === 'textarea') ? document.createElement('textarea') : document.createElement('input');
      i.id = `f-${c.id}`;
      i.className = (c.type === 'textarea') ? 'field-textarea' : 'field-input';
      g.appendChild(i);
      f.appendChild(g);
    });
  }

  async function loadData() {
    const res = await fetch(WORKER_URL, { method: 'POST', body: JSON.stringify({ action: 'get_service_hub', p, uid }) });
    const result = await res.json();
    if (result.status === 'success') {
      document.getElementById('header-store').innerText = result.data.storeName;
      document.getElementById('u-store').innerText = `📍 目前在：${result.data.storeName}`;
      config.forEach(c => { if(result.data.myProfile[c.id]) document.getElementById(`f-${c.id}`).value = result.data.myProfile[c.id]; });
    }
  }

  async function saveProfile() {
    const profile = {};
    config.forEach(c => { profile[c.id] = document.getElementById(`f-${c.id}`).value; });
    const res = await fetch(WORKER_URL, { method: 'POST', body: JSON.stringify({ action: 'save_profile', p, uid, profile }) });
    const result = await res.json();
    alert(result.message);
    switchView('home');
  }

  async function getAiMatches() {
    document.getElementById('ai-loading').style.display = 'block';
    document.getElementById('ai-result').style.display = 'none';
    const res = await fetch(WORKER_URL, { method: 'POST', body: JSON.stringify({ action: 'get_ai_matches', p, uid }) });
    document.getElementById('ai-result').innerText = await res.text();
    document.getElementById('ai-loading').style.display = 'none';
    document.getElementById('ai-result').style.display = 'block';
  }

  function switchView(v) {
    document.querySelectorAll('.container').forEach(el => el.style.display = 'none');
    document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('view-' + v).style.display = 'block';
    document.getElementById('nav-' + v).classList.add('active');
    if(v === 'ai') getAiMatches();
  }

  init();
</script>
</body>
</html>
