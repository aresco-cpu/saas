<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>服務中心</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: -apple-system, sans-serif; margin: 0; background: #F4F4F4; color: #333333; font-size: 15px; font-weight: 400; padding-bottom: 80px; }
    .app-container { max-width: 450px; margin: 0 auto; background: #F4F4F4; min-h-screen: 100vh; }
    
    header { background: #06C755; color: white; padding: 30px 20px; text-align: center; }
    header h2 { margin: 0; font-size: 15px; font-weight: 400; letter-spacing: 1px; }

    .user-profile { background: #FFFFFF; padding: 20px; display: flex; align-items: center; border-bottom: 1px solid #EEEEEE; }
    .user-avatar { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; background: #F0F0F0; }
    .user-info { flex: 1; }
    .user-name { margin: 0; font-size: 15px; color: #333333; }
    .user-role { font-size: 15px; color: #06C755; margin-top: 4px; display: block; }

    .container { padding: 15px; }
    .menu-card { background: #FFFFFF; padding: 20px; border-radius: 0; margin-bottom: 1px; display: flex; flex-direction: column; cursor: pointer; }
    .menu-card h3 { margin: 0 0 8px 0; font-size: 15px; font-weight: 400; color: #333333; }
    .menu-card p { margin: 0; font-size: 15px; color: #999999; }

    /* 表單樣式 */
    .field-group { background: #FFFFFF; padding: 15px 20px; border-bottom: 1px solid #F9F9F9; }
    .field-label { font-size: 15px; color: #666666; margin-bottom: 8px; display: block; }
    .field-input { width: 100%; border: none; font-size: 15px; padding: 5px 0; outline: none; color: #333333; background: transparent; }
    .field-textarea { width: 100%; border: none; font-size: 15px; padding: 5px 0; outline: none; height: 80px; resize: none; color: #333333; background: transparent; }

    .btn-action { width: calc(100% - 40px); margin: 20px; padding: 15px; background: #06C755; color: white; border: none; font-size: 15px; cursor: pointer; text-align: center; }

    /* 底部導覽 */
    nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: #FFFFFF; display: flex; border-top: 1px solid #EEEEEE; height: 65px; left: 50%; transform: translateX(-50%); }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #999999; cursor: pointer; }
    .nav-item.active { color: #06C755; }
    .nav-text { font-size: 15px; margin-top: 2px; }

    .ai-result-box { background: #FFFFFF; padding: 20px; line-height: 1.6; white-space: pre-wrap; font-size: 15px; color: #333333; }
  </style>
</head>
<body>
  <div class="app-container">
    <header><h2 id="brand-name">載入中...</h2></header>

    <div class="user-profile">
      <img id="user-avatar" class="user-avatar" src="">
      <div class="user-info">
        <p id="user-display-name" class="user-name">使用者</p>
        <span id="role-text" class="user-role" style="display:none;">管理權限已開啟</span>
      </div>
    </div>

    <div id="view-home" class="container">
      <div class="menu-card" onclick="switchView('profile')">
        <h3>📇 數位名片設定</h3>
        <p>完善產業資訊，開啟 AI 配對功能。</p>
      </div>
      <div class="menu-card" onclick="switchView('activity')">
        <h3>📅 活動報名中心</h3>
        <p>查看並報名此商圈最新的活動。</p>
      </div>
      <div class="menu-card" onclick="switchView('ai')">
        <h3>🤖 AI 智能配對</h3>
        <p>分析資源與需求，尋找合作商機。</p>
      </div>
    </div>

    <div id="view-profile" style="display:none;">
      <div class="field-group"><label class="field-label">姓名</label><input id="f-name" class="field-input"></div>
      <div class="field-group"><label class="field-label">職稱</label><input id="f-job" class="field-input"></div>
      <div class="field-group"><label class="field-label">產業</label><input id="f-industry" class="field-input"></div>
      <div class="field-group"><label class="field-label">我的資源</label><textarea id="f-resource" class="field-textarea"></textarea></div>
      <div class="field-group"><label class="field-label">我的需求</label><textarea id="f-need" class="field-textarea"></textarea></div>
      <button class="btn-action" onclick="saveProfile()">儲存並更新名片</button>
    </div>

    <div id="view-ai" style="display:none;">
      <div id="ai-content" class="ai-result-box">點擊下方按鈕開始 AI 配對分析...</div>
      <button class="btn-action" style="background:#333;" onclick="getAiMatches()">重新獲取配對建議</button>
    </div>

    <nav>
      <div class="nav-item active" id="nav-home" onclick="switchView('home')"><span class="nav-text">首頁</span></div>
      <div class="nav-item" id="nav-profile" onclick="switchView('profile')"><span class="nav-text">名片</span></div>
      <div class="nav-item" id="nav-activity" onclick="switchView('activity')"><span class="nav-text">活動</span></div>
      <div class="nav-item" id="nav-ai" onclick="switchView('ai')"><span class="nav-text">配對</span></div>
    </nav>
  </div>

  <script>
    const LIFF_ID = '2009367829-5bIWGL8O';
    const WORKER_URL = 'https://saas.ares-co2026.workers.dev/';
    let uid = '', p = '';

    async function init() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const profile = await liff.getProfile();
        uid = profile.userId;
        document.getElementById('user-avatar').src = profile.pictureUrl;
        document.getElementById('user-display-name').innerText = profile.displayName;

        const urlParams = new URLSearchParams(window.location.search);
        p = urlParams.get('p');
        loadHubData();
      } catch (e) { console.error(e); }
    }

    async function loadHubData() {
      const res = await fetch(WORKER_URL, { method: 'POST', body: JSON.stringify({ action: 'get_service_hub', p, uid }) });
      const result = await res.json();
      if (result.status === 'success') {
        document.getElementById('brand-name').innerText = result.data.brandName || "服務中心";
        if (result.data.isAdmin) document.getElementById('role-text').style.display = 'block';
        
        const prof = result.data.myProfile;
        if (prof) {
          document.getElementById('f-name').value = prof.name || '';
          document.getElementById('f-job').value = prof.job || '';
          document.getElementById('f-industry').value = prof.industry || '';
          document.getElementById('f-resource').value = prof.resource || '';
          document.getElementById('f-need').value = prof.need || '';
        }
      }
    }

    async function saveProfile() {
      const data = {
        name: document.getElementById('f-name').value,
        job: document.getElementById('f-job').value,
        industry: document.getElementById('f-industry').value,
        resource: document.getElementById('f-resource').value,
        need: document.getElementById('f-need').value
      };
      await fetch(WORKER_URL, { method: 'POST', body: JSON.stringify({ action: 'save_profile', p, uid, profile: data }) });
      alert('資料已更新');
      switchView('home');
    }

    function switchView(v) {
      ['home', 'profile', 'ai'].forEach(id => {
        const el = document.getElementById('view-' + id);
        if (el) el.style.display = (id === v) ? 'block' : 'none';
        const nav = document.getElementById('nav-' + id);
        if (nav) nav.classList.toggle('active', id === v);
      });
      window.scrollTo(0, 0);
    }

    init();
  </script>
</body>
</html>
