<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>經銷商註冊</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: -apple-system, sans-serif; margin: 0; background: #FFFFFF; color: #333333; font-size: 15px; font-weight: 400; -webkit-font-smoothing: antialiased; }
    .page-container { max-width: 450px; margin: 0 auto; padding: 20px; }
    
    header { padding: 10px 0 30px 0; border-bottom: 1px solid #EEEEEE; margin-bottom: 25px; }
    header h2 { margin: 0; font-size: 15px; font-weight: 400; color: #06C755; }

    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; color: #666666; font-size: 15px; }
    input { width: 100%; padding: 12px 0; border: none; border-bottom: 1px solid #EEEEEE; border-radius: 0; font-size: 15px; outline: none; background: transparent; color: #333333; }
    input:focus { border-bottom-color: #06C755; }
    input::placeholder { color: #CCCCCC; }

    .btn-main { width: 100%; padding: 15px; background-color: #06C755; color: white; border: none; border-radius: 0; font-size: 15px; font-weight: 400; margin-top: 10px; cursor: pointer; text-align: center; display: block; text-decoration: none; box-sizing: border-box; }
    .btn-dark { background-color: #333333; }
    
    #message { margin-top: 20px; color: #666666; text-align: center; font-size: 15px; line-height: 1.6; }
    .error { color: #FF4D4F; }
    .loading { color: #999999; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="page-container">
    <header>
      <h2 id="page-title">2026 經銷商入駐申請</h2>
    </header>

    <!-- 註冊表單區塊 -->
    <div id="form-container" class="hidden">
      <div class="form-group">
        <label>負責人姓名</label>
        <input type="text" id="name" placeholder="請輸入姓名" required>
      </div>
      <div class="form-group">
        <label>公司 / 團隊名稱</label>
        <input type="text" id="company" placeholder="用於正式合約" required>
      </div>
      <div class="form-group">
        <label>品牌 / 店家名稱 (Banner 顯示)</label>
        <input type="text" id="brand" placeholder="例：阿瑞斯咖啡廳" required>
      </div>
      <div class="form-group">
        <label>聯絡電話</label>
        <input type="tel" id="phone" placeholder="09xx-xxx-xxx" required>
      </div>
      <div class="form-group">
        <label>電子信箱</label>
        <input type="email" id="email" placeholder="example@mail.com" required>
      </div>
      <div class="form-group">
        <label>預計推廣管道</label>
        <input type="text" id="channel" placeholder="FB、LINE群組、實體店面">
      </div>
      <button class="btn-main" onclick="submitForm()">送出申請</button>
    </div>
    
    <!-- 狀態顯示與快捷跳轉 -->
    <div id="status-container" class="hidden">
      <div id="message">正在驗證您的身分...</div>
      <div id="action-buttons" class="hidden">
        <a id="btn-admin" href="admin.html" class="btn-main btn-dark hidden">進入審核後台</a>
        <a id="btn-hub" href="#" class="btn-main hidden">進入服務中台</a>
      </div>
    </div>

    <div id="init-loader" class="message loading">系統初始化中...</div>
  </div>

  <script>
    const LIFF_ID = '2009367829-5bIWGL8O';
    const WORKER_URL = 'https://saas.ares-co2026.workers.dev/';
    let userUid = '';
    let storeP = '';

    async function init() {
      // 1. 解析網址參數
      const urlParams = new URLSearchParams(window.location.search);
      storeP = urlParams.get('p');

      // 2. 如果帶有店家代號 p，直接導向中台 (不需要在首頁判斷)
      if (storeP) {
        window.location.href = `service_hub.html?p=${storeP}`;
        return;
      }

      // 3. 初始化 LIFF
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const profile = await liff.getProfile();
        userUid = profile.userId;
        document.getElementById('init-loader').classList.add('hidden');
        checkStatus();
      } catch (err) { 
        document.getElementById('init-loader').innerText = 'LIFF 初始化失敗'; 
      }
    }

    async function checkStatus() {
      const statusContainer = document.getElementById('status-container');
      const msgEl = document.getElementById('message');
      statusContainer.classList.remove('hidden');

      try {
        const res = await fetch(WORKER_URL, { 
          method: 'POST', 
          body: JSON.stringify({ action: 'check_status', uid: userUid }) 
        });
        const result = await res.json();
        
        // 根據 GAS 回傳的狀態處理 (status: success, data: { status: 'registered', message: '管理員' })
        if (result.status === 'success' && result.data.status === 'registered') {
          const stateMsg = result.data.message;
          
          if (stateMsg === '管理員') {
            msgEl.innerText = '您已具備經銷商管理權限。';
            document.getElementById('action-buttons').classList.remove('hidden');
            document.getElementById('btn-admin').classList.remove('hidden');
            
            // 如果是管理員，嘗試找尋他自己的商店連結 (這裡簡化，通常管理員會有一個預設 SID)
            // 實務上可以再從 data 中取出 SID 給予進入中台的按鈕
          } else {
            msgEl.innerText = '您的申請正在審核中，請稍候。';
          }
        } else {
          // 未註冊，顯示表單
          statusContainer.classList.add('hidden');
          document.getElementById('form-container').classList.remove('hidden');
        }
      } catch (e) {
        msgEl.innerText = '系統連線異常，請重新整理。';
      }
    }

    async function submitForm() {
      const brand = document.getElementById('brand').value;
      if (!brand) { alert('請填寫品牌名稱'); return; }

      document.getElementById('form-container').classList.add('hidden');
      document.getElementById('status-container').classList.remove('hidden');
      document.getElementById('message').innerText = '正在提交申請...';

      const payload = {
        action: 'register_dealer',
        uid: userUid,
        name: document.getElementById('name').value,
        company: document.getElementById('company').value,
        brand: brand,
        phone: document.getElementById('phone').value,
        email: document.getElementById('email').value,
        channel: document.getElementById('channel').value
      };

      try {
        await fetch(WORKER_URL, { method: 'POST', body: JSON.stringify(payload) });
        document.getElementById('message').innerText = '申請成功！我們將盡快與您聯繫。';
      } catch (e) { 
        document.getElementById('message').innerText = '傳送失敗，請稍後再試。'; 
        document.getElementById('form-container').classList.remove('hidden');
      }
    }

    init();
  </script>
</body>
</html>
