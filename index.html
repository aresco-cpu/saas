<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>經銷商註冊</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; }
    input { width: 100%; padding: 8px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background-color: #06C755; color: white; border: none; border-radius: 5px; font-size: 16px; }
    #message { margin-top: 15px; color: red; }
  </style>
</head>
<body>
  <h2>經銷商註冊表單</h2>
  <div id="form-container" style="display:none;">
    <div class="form-group">
      <label>姓名 / 負責人</label>
      <input type="text" id="name" required>
    </div>
    <div class="form-group">
      <label>公司 / 團隊名稱</label>
      <input type="text" id="company" required>
    </div>
    <div class="form-group">
      <label>聯絡電話</label>
      <input type="tel" id="phone" required>
    </div>
    <div class="form-group">
      <label>電子信箱</label>
      <input type="email" id="email" required>
    </div>
    <div class="form-group">
      <label>預計推廣管道</label>
      <input type="text" id="channel" placeholder="例如：FB社團、個人網站" required>
    </div>
    <button onclick="submitForm()">送出申請</button>
  </div>
  <div id="message">載入中，請稍候...</div>

  <script>
    const LIFF_ID = '2009367829-5bIWGL8O';
    const WORKER_URL = 'https://026.workers.dev/saas.ares-co2';
    let userUid = '';

    async function initLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }
        const profile = await liff.getProfile();
        userUid = profile.userId;
        document.getElementById('form-container').style.display = 'block';
        document.getElementById('message').innerText = '';
      } catch (err) {
        document.getElementById('message').innerText = 'LIFF 初始化失敗：' + err.message;
      }
    }

    async function submitForm() {
      const name = document.getElementById('name').value;
      const company = document.getElementById('company').value;
      const phone = document.getElementById('phone').value;
      const email = document.getElementById('email').value;
      const channel = document.getElementById('channel').value;

      if (!name || !company || !phone || !email || !channel) {
        document.getElementById('message').innerText = '請填寫所有欄位';
        return;
      }

      document.getElementById('message').innerText = '資料傳送中...';
      
      const payload = {
        action: 'register_dealer',
        uid: userUid,
        name: name,
        company: company,
        phone: phone,
        email: email,
        channel: channel
      };

      try {
        const response = await fetch(WORKER_URL, {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        const result = await response.text();
        document.getElementById('message').innerText = result;
        document.getElementById('form-container').style.display = 'none';
      } catch (err) {
        document.getElementById('message').innerText = '傳送失敗，請稍後再試。';
      }
    }

    initLiff();
  </script>
</body>
</html>
