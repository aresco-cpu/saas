<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>行政管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: -apple-system, sans-serif; background-color: #fff; color: #111; -webkit-font-smoothing: antialiased; }
    .nav-tabs { display: flex; border-bottom: 1px solid #f0f0f0; position: sticky; top: 0; background: #fff; z-index: 20; }
    .tab { flex: 1; text-align: center; padding: 14px 0; font-size: 14px; color: #8e8e93; cursor: pointer; }
    .tab-active { color: #06C755; border-bottom: 2px solid #06C755; }
    .item-row { padding: 16px 20px; border-bottom: 1px solid #f8f8f8; }
    .item-row:active { background-color: #fcfcfc; }
    .text-grey { color: #8e8e93; font-size: 11px; }
    .text-title { font-size: 15px; color: #111; margin-bottom: 2px; }
    .btn-approve { background: #06C755; color: white; padding: 5px 14px; border-radius: 4px; font-size: 13px; border: none; }
    .link-blue { color: #007aff; font-size: 11px; word-break: break-all; text-decoration: none; margin-top: 4px; display: block; }
    .copy-tag { font-size: 10px; color: #007aff; border: 1px solid #007aff; padding: 1px 4px; border-radius: 3px; display: inline-block; margin-top: 5px; cursor: pointer; }
    
    /* 彈窗樣式 - 極簡化 */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 100; padding: 20px; }
    .modal-content { background: white; border-radius: 8px; width: 100%; max-width: 300px; padding: 20px; }
    .input-sid { width: 100%; padding: 10px; border: 1px solid #eee; border-radius: 6px; font-size: 14px; outline: none; margin-top: 10px; background: #f9f9f9; }
  </style>
</head>
<body>

<div class="max-w-[480px] mx-auto min-h-screen">
  <header class="p-5 flex justify-between items-center border-b border-gray-50">
    <div class="text-lg">經銷商審核</div>
    <div class="text-grey">管理員模式</div>
  </header>

  <nav class="nav-tabs">
    <div onclick="switchTab('待審核')" id="tab-pending" class="tab tab-active">待審核</div>
    <div onclick="switchTab('已核准')" id="tab-approved" class="tab">已核准</div>
  </nav>

  <div id="list-container">
    <div class="p-20 text-center text-grey">讀取中...</div>
  </div>
</div>

<!-- 核准彈窗 -->
<div id="modal-box" class="modal">
  <div class="modal-content">
    <div class="text-sm">核准申請</div>
    <div class="text-grey mt-1">請指定商店 SID</div>
    <input type="text" id="input-sid" class="input-sid" placeholder="例：ST_001">
    <div class="flex gap-4 mt-6">
      <button onclick="closeModal()" class="flex-1 text-grey text-sm">取消</button>
      <button onclick="confirmApprove()" class="flex-1 py-2 bg-[#06C755] text-white rounded text-sm">確認</button>
    </div>
  </div>
</div>

<script>
  const LIFF_ID = '2009367829-5bIWGL8O';
  const WORKER_URL = 'https://saas.ares-co2026.workers.dev/';
  let uid = '', currentTab = '待審核', selectedUid = '', suggestedSid = '';

  async function init() {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    uid = (await liff.getProfile()).userId;
    loadList();
  }

  function switchTab(status) {
    currentTab = status;
    document.getElementById('tab-pending').classList.toggle('tab-active', status === '待審核');
    document.getElementById('tab-approved').classList.toggle('tab-active', status === '已核准');
    loadList();
  }

  async function loadList() {
    const container = document.getElementById('list-container');
    container.innerHTML = '<div class="p-20 text-center text-grey">資料處理中...</div>';
    
    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'get_dealers', admin_uid: uid, targetStatus: currentTab })
      });
      const result = await res.json();
      
      if (result.status === 'success') {
        suggestedSid = result.suggestedSid;
        renderRows(result.list); 
      } else {
        container.innerHTML = `<div class="p-10 text-center text-red-400 text-xs">${result.message}</div>`;
      }
    } catch (e) {
      container.innerHTML = `<div class="p-10 text-center text-red-400 text-xs">後端無回應，請確認 GAS 授權。</div>`;
    }
  }

  function renderRows(list) {
    const container = document.getElementById('list-container');
    if (!list || list.length === 0) {
      container.innerHTML = `<div class="p-20 text-center text-grey text-xs">暫無資料</div>`;
      return;
    }

    container.innerHTML = list.map(item => {
      const url = `https://saas.ares-co2026.workers.dev/?p=${item.p}`;
      return `
        <div class="item-row">
          <div class="flex justify-between items-start">
            <div class="flex-1">
              <div class="text-grey">${item.company || '個人'}</div>
              <div class="text-title">${item.name}</div>
              ${currentTab === '已核准' ? `
                <div class="text-grey mt-1">ID: ${item.sid}</div>
                <a href="${url}" target="_blank" class="link-blue">${url}</a>
                <div class="copy-tag" onclick="copyUrl('${url}')">複製網址</div>
              ` : ''}
            </div>
            ${currentTab === '待審核' ? `
              <button onclick="openModal('${item.uid}')" class="btn-approve">核准</button>
            ` : ''}
          </div>
          <div class="text-grey mt-2">${item.phone} · ${new Date(item.time).toLocaleDateString()} 申請</div>
        </div>
      `;
    }).join('');
  }

  function copyUrl(text) {
    const el = document.createElement('textarea');
    el.value = text;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    alert('已複製');
  }

  function openModal(targetUid) {
    selectedUid = targetUid;
    document.getElementById('input-sid').value = suggestedSid;
    document.getElementById('modal-box').style.display = 'flex';
  }

  function closeModal() { document.getElementById('modal-box').style.display = 'none'; }

  async function confirmApprove() {
    const sid = document.getElementById('input-sid').value;
    if (!sid) return;
    closeModal();
    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'approve_dealer', admin_uid: uid, target_uid: selectedUid, sid: sid })
      });
      const result = await res.json();
      alert(result.message);
      loadList();
    } catch (e) { alert('操作異常'); }
  }

  init();
</script>
</body>
</html>
