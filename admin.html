<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>行政審核後台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: -apple-system, sans-serif; background-color: #f8f9fa; color: #333; }
    .tab-active { color: #06C755; border-bottom: 2px solid #06C755; font-weight: 500; }
    .dealer-card { background: white; border-bottom: 1px solid #f0f0f0; padding: 20px; transition: 0.2s; }
    .dealer-card:active { background-color: #f9f9f9; }
    .status-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #eee; color: #888; }
    .btn-approve { background: #06C755; color: white; padding: 6px 16px; border-radius: 6px; font-size: 13px; }
    .modal { background: rgba(0,0,0,0.5); display: none; position: fixed; inset: 0; z-index: 50; align-items: center; justify-content: center; padding: 20px; }
    .modal-content { background: white; border-radius: 12px; width: 100%; max-width: 320px; padding: 25px; }
    input { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 8px; font-size: 15px; margin-top: 10px; outline: none; }
  </style>
</head>
<body class="flex justify-center">

<div class="w-full max-w-[480px] min-h-screen bg-white">
  <header class="p-5 border-b border-gray-100 flex justify-between items-center">
    <h2 class="text-xl font-medium">經銷商審核</h2>
    <span id="admin-name" class="text-xs text-gray-400">系統管理員</span>
  </header>

  <nav class="flex border-b border-gray-50">
    <div onclick="switchTab('待審核')" id="tab-pending" class="flex-1 text-center py-4 text-sm cursor-pointer tab-active">待審核</div>
    <div onclick="switchTab('已核准')" id="tab-approved" class="flex-1 text-center py-4 text-sm cursor-pointer text-gray-400">已核准</div>
  </nav>

  <div id="dealer-list" class="pb-20">
    <div class="p-10 text-center text-gray-300 text-sm">載入名單中...</div>
  </div>
</div>

<!-- 核准對話框 -->
<div id="approve-modal" class="modal">
  <div class="modal-content">
    <h3 class="text-lg mb-2">核准經銷商</h3>
    <p class="text-xs text-gray-400 mb-4">請指派此經銷商的商店編號 (SID)</p>
    <span class="text-[11px] color-gray-300">建議編號</span>
    <input type="text" id="assign-sid" placeholder="例如: ST_001">
    <div class="flex gap-3 mt-6">
      <button onclick="closeModal()" class="flex-1 py-3 text-sm text-gray-400">取消</button>
      <button onclick="confirmApprove()" class="flex-1 py-3 bg-[#06C755] text-white rounded-lg text-sm">確認核准</button>
    </div>
  </div>
</div>

<script>
  const LIFF_ID = '2009367829-5bIWGL8O'; // 您的管理員 LIFF ID
  const WORKER_URL = 'https://saas.ares-co2026.workers.dev/';
  let uid = '', currentTab = '待審核', selectedUid = '', suggestedSid = '';

  async function init() {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    uid = (await liff.getProfile()).userId;
    loadDealers();
  }

  function switchTab(status) {
    currentTab = status;
    document.getElementById('tab-pending').className = `flex-1 text-center py-4 text-sm cursor-pointer ${status==='待審核'?'tab-active':'text-gray-400'}`;
    document.getElementById('tab-approved').className = `flex-1 text-center py-4 text-sm cursor-pointer ${status==='已核准'?'tab-active':'text-gray-400'}`;
    loadDealers();
  }

  async function loadDealers() {
    const listContainer = document.getElementById('dealer-list');
    listContainer.innerHTML = '<div class="p-10 text-center text-gray-300 text-sm">載入中...</div>';
    
    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'get_dealers', admin_uid: uid, targetStatus: currentTab })
      });
      const result = await res.json();
      
      if (result.status === 'success') {
        renderList(result.data); // 注意：result.data 已經是後端整理好的 list
        suggestedSid = result.suggestedSid;
      } else {
        listContainer.innerHTML = `<div class="p-10 text-center text-red-400 text-sm">${result.message}</div>`;
      }
    } catch (e) {
      listContainer.innerHTML = '<div class="p-10 text-center text-red-400 text-sm">連線後端失敗</div>';
    }
  }

  function renderList(list) {
    const container = document.getElementById('dealer-list');
    if (!list || list.length === 0) {
      container.innerHTML = `<div class="p-20 text-center text-gray-300 text-sm">目前沒有${currentTab}的名單</div>`;
      return;
    }

    container.innerHTML = list.map(item => `
      <div class="dealer-card">
        <div class="flex justify-between items-start mb-2">
          <div>
            <div class="text-sm text-gray-400 mb-1">${item.company || '個人申請'}</div>
            <div class="text-lg font-medium mb-1">${item.name}</div>
          </div>
          ${currentTab === '待審核' ? 
            `<button onclick="openModal('${item.uid}')" class="btn-approve">核准</button>` : 
            `<span class="status-badge">SID: ${item.sid}</span>`
          }
        </div>
        <div class="text-xs text-gray-400">
          聯絡電話: ${item.phone} <br>
          申請時間: ${new Date(item.time).toLocaleString()}
        </div>
      </div>
    `).join('');
  }

  function openModal(targetUid) {
    selectedUid = targetUid;
    document.getElementById('assign-sid').value = suggestedSid;
    document.getElementById('approve-modal').style.display = 'flex';
  }

  function closeModal() {
    document.getElementById('approve-modal').style.display = 'none';
  }

  async function confirmApprove() {
    const sid = document.getElementById('assign-sid').value;
    if (!sid) return alert('請輸入 SID');
    
    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'approve_dealer', admin_uid: uid, target_uid: selectedUid, sid: sid })
      });
      const result = await res.json();
      alert(result.message);
      closeModal();
      loadDealers();
    } catch (e) {
      alert('核准操作失敗');
    }
  }

  init();
</script>
</body>
</html>
