<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>admin.html</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    /* 全局規範：15px, 不加粗, LINE 原生風格 */
    body { font-family: -apple-system, sans-serif; margin: 0; background: #F4F4F4; color: #333333; font-size: 15px; font-weight: 400; -webkit-font-smoothing: antialiased; }
    .admin-container { max-width: 450px; margin: 0 auto; min-height: 100vh; }
    
    .tabs { display: flex; background: #FFFFFF; border-bottom: 1px solid #EEEEEE; position: sticky; top: 0; z-index: 10; }
    .tab { flex: 1; text-align: center; padding: 15px; color: #999999; cursor: pointer; font-size: 15px; }
    .tab.active { color: #06C755; border-bottom: 2px solid #06C755; }

    .list-area { padding: 1px 0; }
    .dealer-card { background: #FFFFFF; padding: 20px; border-bottom: 1px solid #F0F0F0; margin-bottom: 1px; }
    .dealer-name { font-size: 15px; color: #333333; margin-bottom: 6px; }
    .dealer-brand { font-size: 15px; color: #06C755; margin-bottom: 8px; }
    .dealer-info { font-size: 14px; color: #666666; line-height: 1.5; }

    .action-row { display: flex; align-items: center; gap: 10px; margin-top: 15px; }
    .sid-input { flex: 1; padding: 10px 0; border: none; border-bottom: 1px solid #EEEEEE; font-size: 15px; color: #007AFF; outline: none; background: transparent; }
    .btn-approve { padding: 10px 20px; background: #06C755; color: white; border: none; font-size: 15px; cursor: pointer; border-radius: 4px; }
    
    .link-box { margin-top: 15px; padding: 15px; background: #F9F9F9; color: #007AFF; font-size: 14px; word-break: break-all; border-left: 3px solid #06C755; }
    #message { padding: 60px 20px; text-align: center; color: #999999; font-size: 15px; }
    .error { color: #FF4D4F; }
  </style>
</head>
<body>
  <div class="admin-container">
    <div class="tabs">
      <div class="tab active" id="tab-pending" onclick="switchTab('待審核')">待審核</div>
      <div class="tab" id="tab-approved" onclick="switchTab('已核准')">已核准</div>
    </div>
    <div id="message">驗證權限中...</div>
    <div id="list-container" class="list-area"></div>
  </div>

  <script>
    const LIFF_ID = '2009367829-5bIWGL8O';
    const WORKER_URL = 'https://saas.ares-co2026.workers.dev/';
    let adminUid = '';
    let currentTab = '待審核';

    async function init() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const profile = await liff.getProfile();
        adminUid = profile.userId;
        // Super Admin UID 檢查
        if (adminUid !== 'Uf729764dbb5b652a5a90a467320bea29') {
          document.getElementById('message').innerText = '權限不足';
          return;
        }
        loadDealers();
      } catch (err) { 
        document.getElementById('message').innerHTML = `<span class="error">初始化失敗: ${err.message}</span>`;
      }
    }

    function switchTab(status) {
      currentTab = status;
      document.getElementById('tab-pending').classList.toggle('active', status === '待審核');
      document.getElementById('tab-approved').classList.toggle('active', status === '已核准');
      loadDealers();
    }

    async function loadDealers() {
      const container = document.getElementById('list-container');
      const msg = document.getElementById('message');
      msg.innerText = '讀取中...';
      container.innerHTML = '';

      try {
        const res = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'get_dealers', admin_uid: adminUid, targetStatus: currentTab })
        });
        
        const result = await res.json();
        
        if (result.status === 'success') {
          msg.innerText = '';
          const dealers = result.data.data;
          const suggestedSid = result.data.suggestedSid;

          if (!dealers || dealers.length === 0) {
            msg.innerText = `目前無${currentTab}申請`;
            return;
          }

          dealers.forEach((item) => {
            const card = document.createElement('div');
            card.className = 'dealer-card';
            const displaySid = item.sid || suggestedSid;
            card.innerHTML = `
              <div class="dealer-name">負責人：${item.name}</div>
              <div class="dealer-brand">品牌：${item.brand || item.company}</div>
              <div class="dealer-info">電話：${item.phone}<br>管道：${item.channel}</div>
              <div class="action-row">
                <input type="text" id="sid_${item.uid}" class="sid-input" value="${displaySid}">
                <button class="btn-approve" onclick="approve('${item.uid}')">核准</button>
              </div>
              <div id="res_${item.uid}" style="display:none;"></div>
            `;
            container.appendChild(card);
          });
        } else {
          msg.innerHTML = `<span class="error">載入失敗: ${result.message}</span>`;
        }
      } catch (e) { 
        msg.innerHTML = `<span class="error">連線失敗，請檢查 Worker 設定</span>`; 
      }
    }

    async function approve(targetUid) {
      const sid = document.getElementById(`sid_${targetUid}`).value;
      const resBox = document.getElementById(`res_${targetUid}`);
      resBox.style.display = 'block';
      resBox.innerText = '正在配置資料庫...';
      try {
        const res = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'approve_dealer', admin_uid: adminUid, target_uid: targetUid, sid: sid })
        });
        const result = await res.json();
        if (result.status === 'success') {
          resBox.className = 'link-box';
          resBox.innerText = '核准成功！連結：' + result.data.link;
        } else {
          resBox.innerText = '核准失敗：' + result.message;
        }
      } catch (e) { resBox.innerText = '網路異常'; }
    }
    init();
  </script>
</body>
</html>
