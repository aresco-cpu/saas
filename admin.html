<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>行政審核後台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: -apple-system, sans-serif; background: #fff; color: #333; }
    .tab-item { flex: 1; text-align: center; padding: 15px 0; font-size: 14px; color: #999; cursor: pointer; border-bottom: 1.5px solid #f2f2f2; }
    .tab-active { color: #06C755; border-bottom-color: #06C755; }
    .dealer-card { padding: 20px; border-bottom: 1px solid #f9f9f9; }
    .btn-approve { background: #06C755; color: white; padding: 6px 14px; border-radius: 6px; font-size: 13px; border: none; cursor: pointer; }
    .btn-copy { background: #f5f5f5; color: #666; padding: 5px 10px; border-radius: 4px; font-size: 11px; border: none; margin-top: 8px; cursor: pointer; }
    .modal { background: rgba(0,0,0,0.5); display: none; position: fixed; inset: 0; z-index: 100; align-items: center; justify-content: center; padding: 20px; }
    .modal-content { background: white; border-radius: 12px; width: 100%; max-width: 320px; padding: 24px; }
    input { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 8px; font-size: 15px; margin-top: 10px; outline: none; background: #fafafa; }
    .url-link { font-size: 11px; color: #007aff; display: block; word-break: break-all; margin-top: 6px; text-decoration: none; line-height: 1.4; }
  </style>
</head>
<body>

<div class="max-w-[480px] mx-auto min-h-screen">
  <header class="p-5 flex justify-between items-center">
    <h2 class="text-xl font-medium">經銷商審核</h2>
    <span id="admin-info" class="text-[10px] text-gray-300">ADMIN</span>
  </header>

  <nav class="flex">
    <div onclick="switchTab('待審核')" id="tab-pending" class="tab-item tab-active">待審核</div>
    <div onclick="switchTab('已核准')" id="tab-approved" class="tab-item">已核准</div>
  </nav>

  <div id="dealer-list">
    <div class="p-20 text-center text-gray-300 text-sm">載入名單中...</div>
  </div>
</div>

<div id="approve-modal" class="modal">
  <div class="modal-content">
    <h3 class="text-lg font-medium">核准經銷商</h3>
    <p class="text-xs text-gray-400 mt-1">請為該店指定專屬 SID</p>
    <input type="text" id="assign-sid" placeholder="例: ST_001">
    <div class="flex gap-4 mt-8">
      <button onclick="closeModal()" class="flex-1 text-sm text-gray-400">取消</button>
      <button onclick="confirmApprove()" class="flex-1 py-3 bg-[#06C755] text-white rounded-lg text-sm">確認核准</button>
    </div>
  </div>
</div>

<script>
  const LIFF_ID = '2009367829-5bIWGL8O';
  const WORKER_URL = 'https://saas.ares-co2026.workers.dev/';
  let uid = '', currentTab = '待審核', selectedUid = '', suggestedSid = '';

  async function init() {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      const profile = await liff.getProfile();
      uid = profile.userId;
      loadDealers();
    } catch (e) {
      document.getElementById('dealer-list').innerHTML = `<div class="p-10 text-red-400 text-center">LIFF 初始化失敗</div>`;
    }
  }

  function switchTab(status) {
    currentTab = status;
    document.getElementById('tab-pending').classList.toggle('tab-active', status === '待審核');
    document.getElementById('tab-approved').classList.toggle('tab-active', status === '已核准');
    loadDealers();
  }

  async function loadDealers() {
    const container = document.getElementById('dealer-list');
    container.innerHTML = '<div class="p-20 text-center text-gray-300 text-sm">讀取中...</div>';
    
    try {
      const response = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'get_dealers', admin_uid: uid, targetStatus: currentTab })
      });
      
      const result = await response.json();
      
      if (result.status === 'success') {
        suggestedSid = result.suggestedSid;
        renderList(result.data);
      } else {
        container.innerHTML = `<div class="p-20 text-center text-red-300 text-sm">${result.message}</div>`;
      }
    } catch (e) {
      container.innerHTML = `<div class="p-20 text-center text-red-400 text-sm">網路連線異常</div>`;
    }
  }

  function renderList(list) {
    const container = document.getElementById('dealer-list');
    if (!list || list.length === 0) {
      container.innerHTML = `<div class="p-20 text-center text-gray-300 text-xs">暫無${currentTab}的名單</div>`;
      return;
    }

    container.innerHTML = list.map(item => {
      const url = `https://saas.ares-co2026.workers.dev/?p=${item.p}`;
      return `
        <div class="dealer-card">
          <div class="flex justify-between items-start">
            <div class="flex-1">
              <div class="text-[11px] text-gray-400 mb-0.5">${item.company || '個人申請'}</div>
              <div class="text-base font-medium">${item.name}</div>
              ${currentTab === '已核准' ? `
                <div class="mt-2">
                  <span class="text-[10px] bg-gray-50 px-2 py-0.5 rounded text-gray-500">ID: ${item.sid}</span>
                  <a href="${url}" class="url-link" target="_blank">${url}</a>
                  <button onclick="copyText('${url}')" class="btn-copy">複製專屬連結</button>
                </div>
              ` : ''}
            </div>
            ${currentTab === '待審核' ? `<button onclick="openModal('${item.uid}')" class="btn-approve">核准</button>` : ''}
          </div>
          <div class="text-[10px] text-gray-300 mt-3">${item.phone} · ${new Date(item.time).toLocaleDateString()} 申請</div>
        </div>
      `;
    }).join('');
  }

  function copyText(text) {
    const el = document.createElement('textarea');
    el.value = text;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    alert('已複製到剪貼簿');
  }

  function openModal(targetUid) {
    selectedUid = targetUid;
    document.getElementById('assign-sid').value = suggestedSid;
    document.getElementById('approve-modal').style.display = 'flex';
  }

  function closeModal() { document.getElementById('approve-modal').style.display = 'none'; }

  async function confirmApprove() {
    const sid = document.getElementById('assign-sid').value;
    if (!sid) return;
    closeModal();
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'approve_dealer', admin_uid: uid, target_uid: selectedUid, sid: sid })
    });
    const result = await res.json();
    alert(result.message);
    loadDealers();
  }

  init();
</script>
</body>
</html>
