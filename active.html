<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>建立新活動 - 服務中台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: -apple-system, sans-serif; background-color: #f4f4f4; color: #333; }
    .input-group { margin-bottom: 16px; }
    .label-text { display: block; font-size: 13px; color: #666; margin-bottom: 6px; }
    .form-input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; background: #fff; }
    .form-input:focus { border-color: #06C755; }
    .tab-btn { flex: 1; text-align: center; padding: 10px; font-size: 14px; cursor: pointer; color: #999; border-bottom: 2px solid transparent; }
    .tab-btn.active { color: #06C755; border-bottom-color: #06C755; font-weight: 500; }
    .btn-main { background: #06C755; color: white; border: none; width: 100%; padding: 14px; border-radius: 8px; font-size: 16px; cursor: pointer; }
    .btn-ai { background: #333; color: white; padding: 4px 10px; border-radius: 4px; font-size: 11px; float: right; margin-top: -24px; cursor: pointer; }
    .batch-item { background: #fff; border: 1px solid #eee; padding: 12px; border-radius: 8px; margin-bottom: 10px; position: relative; }
    .nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: white; display: flex; border-top: 1px solid #eee; height: 60px; }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #999; cursor: pointer; }
    .nav-btn.active { color: #06C755; }
  </style>
</head>
<body class="flex justify-center">

<div class="w-full max-w-[450px] min-h-screen bg-white relative pb-20">
  <header class="bg-[#06C755] text-white p-4 text-center">
    <h2 class="text-lg font-medium">建立新活動</h2>
  </header>

  <div class="flex bg-gray-50 border-b border-gray-200">
    <div onclick="switchTab('quick')" id="tab-quick" class="tab-btn active">快速匯入</div>
    <div onclick="switchTab('detailed')" id="tab-detailed" class="tab-btn">詳細發佈</div>
    <div onclick="switchTab('batch')" id="tab-batch" class="tab-btn">梯次建立</div>
  </div>

  <main class="p-4">
    <!-- 1. 快速模式 -->
    <div id="form-quick" class="space-y-4">
      <div class="input-group">
        <span class="label-text">活動標題</span>
        <input type="text" id="q-name" class="form-input" placeholder="例：每週例會">
      </div>
      <div class="input-group">
        <span class="label-text">名單內容 (每行一位)</span>
        <textarea id="q-names" class="form-input h-40" placeholder="請貼上參與者姓名..."></textarea>
      </div>
      <button onclick="submitActivity('quick')" class="btn-main">立即建立並匯入</button>
    </div>

    <!-- 2. 詳細模式 -->
    <div id="form-detailed" class="hidden space-y-4">
      <div class="input-group">
        <span class="label-text">正式活動標題</span>
        <input type="text" id="d-name" class="form-input">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div class="input-group">
          <span class="label-text">開始時間</span>
          <input type="datetime-local" id="d-start" class="form-input !text-xs">
        </div>
        <div class="input-group">
          <span class="label-text">結束時間</span>
          <input type="datetime-local" id="d-end" class="form-input !text-xs">
        </div>
      </div>
      <div class="input-group">
        <span class="label-text">活動說明</span>
        <div onclick="aiOptimizeDesc('d-desc')" class="btn-ai">🤖 AI 優化文案</div>
        <textarea id="d-desc" class="form-input h-32" placeholder="輸入活動介紹..."></textarea>
      </div>
      <button onclick="submitActivity('detailed')" class="btn-main">發布正式活動</button>
    </div>

    <!-- 3. 梯次模式 -->
    <div id="form-batch" class="hidden space-y-4">
      <div class="input-group">
        <span class="label-text">系列活動標題</span>
        <input type="text" id="b-name" class="form-input">
      </div>
      <div id="batch-container">
        <!-- 動態梯次 -->
        <div class="batch-item">
          <input type="text" class="form-input b-item-name mb-2" placeholder="梯次名稱 (例：第一梯)">
          <input type="datetime-local" class="form-input b-item-start text-xs">
        </div>
      </div>
      <button onclick="addBatchRow()" class="w-full py-2 border-2 border-dashed border-gray-200 rounded text-gray-400 text-sm">+ 新增梯次</button>
      <button onclick="submitActivity('batch')" class="btn-main mt-4">發布梯次活動</button>
    </div>
  </main>

  <!-- 底部導覽 -->
  <nav class="nav">
    <div class="nav-btn" onclick="location.href='admin.html'"><span>後台</span></div>
    <div class="nav-btn active"><span>建立</span></div>
    <div class="nav-btn" onclick="location.href='service_hub.html?p='+p"><span>前台</span></div>
  </nav>
</div>

<script>
  const LIFF_ID = '2009367829-5bIWGL8O';
  const WORKER_URL = 'https://saas.ares-co2026.workers.dev/';
  let uid = '', p = '';

  async function init() {
    const urlParams = new URLSearchParams(window.location.search);
    p = urlParams.get('p');

    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const profile = await liff.getProfile();
    uid = profile.userId;
  }

  function switchTab(m) {
    ['quick', 'detailed', 'batch'].forEach(t => {
      document.getElementById('tab-' + t).classList.toggle('active', t === m);
      document.getElementById('form-' + t).classList.toggle('hidden', t !== m);
    });
  }

  function addBatchRow() {
    const row = document.createElement('div');
    row.className = 'batch-item';
    row.innerHTML = `<input type="text" class="form-input b-item-name mb-2" placeholder="梯次名稱"><input type="datetime-local" class="form-input b-item-start text-xs">`;
    document.getElementById('batch-container').appendChild(row);
  }

  async function aiOptimizeDesc(id) {
    const el = document.getElementById(id);
    if (!el.value) return alert('請先輸入簡短大綱');
    el.placeholder = 'AI 思考中...';
    
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'ai_optimize_activity', p, content: el.value })
    });
    el.value = await res.text();
  }

  async function submitActivity(mode) {
    let payload = { action: 'create_activity', mode, p, uid };
    
    if (mode === 'quick') {
      payload.name = document.getElementById('q-name').value;
      payload.names = document.getElementById('q-names').value.split('\n').filter(n => n.trim());
    } else if (mode === 'detailed') {
      payload.name = document.getElementById('d-name').value;
      payload.start = document.getElementById('d-start').value;
      payload.end = document.getElementById('d-end').value;
      payload.desc = document.getElementById('d-desc').value;
    }
    
    if (!payload.name) return alert('請填寫活動標題');

    const res = await fetch(WORKER_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
    const result = await res.json();
    alert(result.message);
    if (result.status === 'success') location.reload();
  }

  init();
</script>
</body>
</html>
