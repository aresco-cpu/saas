<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>建立新活動 - 服務中台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: -apple-system, sans-serif; background-color: #f8f8f8; color: #333; margin: 0; }
    .input-group { margin-bottom: 16px; }
    .label-text { display: block; font-size: 13px; color: #666; margin-bottom: 4px; }
    .form-input { width: 100%; padding: 12px; border: 1px solid #e5e5e5; border-radius: 8px; font-size: 15px; outline: none; background: #fff; box-sizing: border-box; }
    .form-input:focus { border-color: #06C755; }
    .tab-btn { flex: 1; text-align: center; padding: 12px; font-size: 14px; cursor: pointer; color: #999; border-bottom: 2px solid transparent; }
    .tab-btn.active { color: #06C755; border-bottom-color: #06C755; font-weight: 500; }
    .btn-main { background: #06C755; color: white; border: none; width: 100%; padding: 14px; border-radius: 8px; font-size: 16px; cursor: pointer; }
    .btn-main:disabled { background: #ccc; cursor: not-allowed; }
    .btn-ai { background: #333; color: white; padding: 4px 10px; border-radius: 4px; font-size: 11px; float: right; margin-top: -24px; cursor: pointer; }
    .image-preview { width: 100%; aspect-ratio: 16/9; background: #fff; border-radius: 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px dashed #ddd; margin-bottom: 8px; }
    .image-preview img { width: 100%; height: 100%; object-fit: cover; }
    .batch-item { background: #fff; border: 1px solid #eee; padding: 12px; border-radius: 8px; margin-bottom: 10px; position: relative; }
    .nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: white; display: flex; border-top: 1px solid #eee; height: 60px; z-index: 10; }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #999; text-decoration: none; }
    .nav-btn.active { color: #06C755; }
    .del-icon { position: absolute; top: 8px; right: 8px; color: #ff4d4f; font-size: 12px; cursor: pointer; padding: 4px; }
  </style>
</head>
<body class="flex justify-center">

<div class="w-full max-w-[450px] min-h-screen bg-white relative pb-24">
  <header class="bg-[#06C755] text-white p-4 text-center sticky top-0 z-20">
    <h2 class="text-lg font-medium">建立新活動</h2>
  </header>

  <div class="flex bg-gray-50 border-b border-gray-200">
    <div onclick="switchTab('quick')" id="tab-quick" class="tab-btn active">快速匯入</div>
    <div onclick="switchTab('detailed')" id="tab-detailed" class="tab-btn">詳細發佈</div>
    <div onclick="switchTab('batch')" id="tab-batch" class="tab-btn">梯次建立</div>
  </div>

  <main class="p-4">
    <!-- 圖片上傳 -->
    <div class="input-group">
      <span class="label-text">活動圖片</span>
      <div class="image-preview" onclick="document.getElementById('img-file').click()">
        <img id="preview-img" src="" class="hidden">
        <span id="preview-placeholder" class="text-gray-400 text-sm">點擊上傳封面圖</span>
      </div>
      <input type="file" id="img-file" class="hidden" accept="image/*" onchange="previewFile()">
    </div>

    <!-- 1. 快速模式 -->
    <div id="form-quick" class="space-y-4">
      <div class="input-group">
        <span class="label-text">活動標題</span>
        <input type="text" id="q-name" class="form-input" placeholder="例：每週例會">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div class="input-group">
          <span class="label-text">開始時間</span>
          <input type="datetime-local" id="q-start" class="form-input !text-xs">
        </div>
        <div class="input-group">
          <span class="label-text">結束時間</span>
          <input type="datetime-local" id="q-end" class="form-input !text-xs">
        </div>
      </div>
      <div class="input-group">
        <span class="label-text">活動說明</span>
        <div onclick="aiOptimizeDesc('q-desc')" class="btn-ai">🤖 AI 優化</div>
        <textarea id="q-desc" class="form-input h-24" placeholder="輸入活動介紹..."></textarea>
      </div>
      <div class="input-group">
        <span class="label-text">名單匯入 (每行一位)</span>
        <textarea id="q-names" class="form-input h-32" placeholder="請貼上參與者姓名..."></textarea>
      </div>
      <button onclick="submitActivity('quick')" id="btn-q" class="btn-main">立即建立並匯入</button>
    </div>

    <!-- 2. 詳細模式 -->
    <div id="form-detailed" class="hidden space-y-4">
      <div class="input-group">
        <span class="label-text">正式活動標題</span>
        <input type="text" id="d-name" class="form-input">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div class="input-group">
          <span class="label-text">開始時間</span>
          <input type="datetime-local" id="d-start" class="form-input !text-xs">
        </div>
        <div class="input-group">
          <span class="label-text">結束時間</span>
          <input type="datetime-local" id="d-end" class="form-input !text-xs">
        </div>
      </div>
      <div class="input-group">
        <span class="label-text">活動詳細介紹</span>
        <div onclick="aiOptimizeDesc('d-desc')" class="btn-ai">🤖 AI 優化</div>
        <textarea id="d-desc" class="form-input h-40" placeholder="活動細節說明..."></textarea>
      </div>
      <button onclick="submitActivity('detailed')" id="btn-d" class="btn-main">發布正式活動</button>
    </div>

    <!-- 3. 梯次模式 -->
    <div id="form-batch" class="hidden space-y-4">
      <div class="input-group">
        <span class="label-text">系列標題</span>
        <input type="text" id="b-name" class="form-input">
      </div>
      <div class="input-group">
        <span class="label-text">系列說明</span>
        <div onclick="aiOptimizeDesc('b-desc')" class="btn-ai">🤖 AI 優化</div>
        <textarea id="b-desc" class="form-input h-24" placeholder="系列活動共通說明..."></textarea>
      </div>
      <div id="batch-container">
        <div class="batch-item">
          <input type="text" class="form-input b-item-name mb-2" placeholder="梯次名稱">
          <div class="grid grid-cols-2 gap-2">
            <input type="datetime-local" class="form-input b-item-start text-xs">
            <input type="datetime-local" class="form-input b-item-end text-xs">
          </div>
        </div>
      </div>
      <div class="flex gap-2">
        <button onclick="addBatchRow(false)" class="flex-1 py-2 border border-gray-300 rounded text-gray-500 text-sm font-medium">+ 空白梯次</button>
        <button onclick="addBatchRow(true)" class="flex-1 py-2 border border-dashed border-[#06C755] rounded text-[#06C755] text-sm font-medium">⧉ 複製前梯</button>
      </div>
      <button onclick="submitActivity('batch')" id="btn-b" class="btn-main mt-4">發布梯次活動</button>
    </div>
  </main>

  <nav class="nav">
    <a id="admin-link" href="admin.html" class="nav-btn"><span>後台</span></a>
    <div class="nav-btn active"><span>建立</span></div>
    <a id="front-link" href="#" class="nav-btn"><span>前台</span></a>
  </nav>
</div>

<script>
  const LIFF_ID = '2009367829-5bIWGL8O';
  const WORKER_URL = 'https://saas.ares-co2026.workers.dev/';
  let uid = '', p = '', imgData = '';

  async function init() {
    const urlParams = new URLSearchParams(window.location.search);
    p = urlParams.get('p');
    
    // 如果網址沒有 p，嘗試從 localStorage 拿
    if (!p) p = localStorage.getItem('current_p');
    if (p) {
      localStorage.setItem('current_p', p);
      document.getElementById('front-link').href = `service_hub.html?p=${p}`;
      document.getElementById('admin-link').href = `admin.html?p=${p}`;
    } else {
      console.warn('缺少經銷商參數 (p)');
    }

    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      const profile = await liff.getProfile();
      uid = profile.userId;
    } catch (e) {
      console.error('LIFF Init Error', e);
    }
  }

  function previewFile() {
    const file = document.getElementById('img-file').files[0];
    const preview = document.getElementById('preview-img');
    const placeholder = document.getElementById('preview-placeholder');
    if (!file) return;
    const reader = new FileReader();
    reader.onloadend = () => {
      imgData = reader.result;
      preview.src = imgData;
      preview.classList.remove('hidden');
      placeholder.classList.add('hidden');
    };
    reader.readAsDataURL(file);
  }

  function switchTab(m) {
    ['quick', 'detailed', 'batch'].forEach(t => {
      document.getElementById('tab-' + t).classList.toggle('active', t === m);
      document.getElementById('form-' + t).classList.toggle('hidden', t !== m);
    });
  }

  function addBatchRow(copyLast = false) {
    const container = document.getElementById('batch-container');
    const items = container.querySelectorAll('.batch-item');
    const lastItem = items[items.length - 1];
    const div = document.createElement('div');
    div.className = 'batch-item';
    let name = "", start = "", end = "";
    if (copyLast && lastItem) {
      name = lastItem.querySelector('.b-item-name').value;
      start = lastItem.querySelector('.b-item-start').value;
      end = lastItem.querySelector('.b-item-end').value;
    }
    div.innerHTML = `<div class="del-icon" onclick="this.parentElement.remove()">移除</div><input type="text" class="form-input b-item-name mb-2" value="${name}" placeholder="梯次名稱"><div class="grid grid-cols-2 gap-2"><input type="datetime-local" class="form-input b-item-start text-xs" value="${start}"><input type="datetime-local" class="form-input b-item-end text-xs" value="${end}"></div>`;
    container.appendChild(div);
  }

  async function aiOptimizeDesc(id) {
    const el = document.getElementById(id);
    if (!el.value) return alert('請先輸入大綱');
    const oldVal = el.value;
    el.value = 'AI 優化中...';
    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'ai_optimize_activity', p, content: oldVal })
      });
      el.value = await res.text();
    } catch (e) { el.value = oldVal; }
  }

  async function submitActivity(mode) {
    if (!p) return alert('缺少必要參數 p，活動無法正確存檔。');
    const btn = document.getElementById('btn-' + (mode === 'quick' ? 'q' : mode === 'detailed' ? 'd' : 'b'));
    let payload = { action: 'create_activity', mode, p, uid, img: imgData };
    
    if (mode === 'quick') {
      payload.name = document.getElementById('q-name').value;
      payload.start = document.getElementById('q-start').value;
      payload.end = document.getElementById('q-end').value;
      payload.desc = document.getElementById('q-desc').value;
      payload.names = document.getElementById('q-names').value.split('\n').filter(n => n.trim());
    } else if (mode === 'detailed') {
      payload.name = document.getElementById('d-name').value;
      payload.start = document.getElementById('d-start').value;
      payload.end = document.getElementById('d-end').value;
      payload.desc = document.getElementById('d-desc').value;
    } else if (mode === 'batch') {
      payload.name = document.getElementById('b-name').value;
      payload.desc = document.getElementById('b-desc').value;
      payload.batches = Array.from(document.querySelectorAll('.batch-item')).map(it => ({
        name: it.querySelector('.b-item-name').value,
        start: it.querySelector('.b-item-start').value,
        end: it.querySelector('.b-item-end').value
      }));
    }
    
    if (!payload.name) return alert('請填寫標題');
    btn.disabled = true;
    btn.innerText = '儲存中...';

    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const text = await res.text();
      let result;
      try { result = JSON.parse(text); } catch(e) { result = { message: text, status: 'unknown' }; }
      
      alert(result.message || '儲存成功');
      if (result.status === 'success' || text.includes('成功')) {
        location.href = `service_hub.html?p=${p}`;
      }
    } catch (e) {
      alert('連線失敗，請稍後再試');
    } finally {
      btn.disabled = false;
      btn.innerText = '完成發布';
    }
  }

  init();
</script>
</body>
</html>
