<!DOCTYPE html>
<html class="light" lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <title>服務中台 - 報名大師</title>
  
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <script id="tailwind-config">
    window.tailwind = window.tailwind || {};
    window.tailwind.config = {
      theme: {
        extend: {
          colors: { primary: "#2563eb", "primary-light": "#eff6ff", background: "#ffffff", "text-main": "#0f172a", "text-muted": "#64748b" },
          fontFamily: { headline: ["Manrope", "Noto Sans TC", "sans-serif"], sans: ["Inter", "Noto Sans TC", "sans-serif"] },
          boxShadow: { 'app-card': '0 4px 20px -2px rgba(0,0,0,0.05)', 'app-nav': '0 -4px 20px rgba(0,0,0,0.03)' }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; vertical-align: middle; }
    body { background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1.5rem); }
    
    .act-card { @apply bg-white rounded-xl overflow-hidden mb-5 shadow-app-card border border-slate-100 transition-transform active:scale-[0.98]; }
    .act-img { @apply w-full h-40 object-cover bg-slate-100; }
    .act-badge { @apply absolute top-3 left-3 px-2 py-1 bg-black/50 backdrop-blur-md text-white text-[10px] font-bold rounded uppercase; }
    
    .category-tab { @apply px-4 py-2 rounded-full text-[13px] font-bold transition-all whitespace-nowrap border; }
    .cat-active { @apply bg-primary text-white border-primary shadow-sm; }
    .cat-inactive { @apply bg-white text-slate-500 border-slate-200 hover:border-primary/30; }

    .nav-btn { @apply flex flex-col items-center justify-center flex-1 text-slate-400 h-full transition-colors; }
    .nav-active { @apply text-primary font-bold; }
    .nav-active .material-symbols-outlined { font-variation-settings: 'FILL' 1; }
  </style>
</head>
<body class="font-sans text-text-main min-h-screen pb-24">

<div id="app" class="max-w-md mx-auto bg-white min-h-screen shadow-2xl relative flex flex-col">
  
  <!-- 頂部商店資訊 -->
  <header id="store-header" class="px-5 pt-8 pb-5 bg-gradient-to-b from-primary/5 to-transparent">
    <div class="flex items-center justify-between mb-2">
      <h1 id="store-name" class="text-2xl font-extrabold tracking-tight font-headline">載入中...</h1>
      <div id="admin-badge" class="hidden bg-slate-800 text-white text-[9px] px-2 py-1 rounded-full font-bold uppercase">Owner</div>
    </div>
    <p class="text-slate-500 text-[13px] font-medium">歡迎光臨我們的活動中心</p>
  </header>

  <!-- 活動目錄 (三種分類) -->
  <div class="px-5 mb-6 overflow-x-auto flex gap-2 no-scrollbar">
    <button onclick="filterMode('all')" id="cat-all" class="category-tab cat-active">全部活動</button>
    <button onclick="filterMode('quick')" id="cat-quick" class="category-tab cat-inactive">快速建立</button>
    <button onclick="filterMode('detailed')" id="cat-detailed" class="category-tab cat-inactive">正式活動</button>
    <button onclick="filterMode('batch')" id="cat-batch" class="category-tab cat-inactive">系列課程</button>
  </div>

  <main class="flex-1 px-5">
    <div id="activity-admin-section" class="hidden mb-6">
      <button onclick="location.href='active.html?p='+p" class="w-full py-4 bg-primary-light text-primary rounded-xl font-bold text-[15px] flex items-center justify-center gap-2 border border-primary/20 hover:bg-primary/10 transition-colors">
        <span class="material-symbols-outlined">add_circle</span> 建立新活動
      </button>
    </div>

    <div id="activity-list" class="space-y-2">
      <!-- 活動列表將渲染於此 -->
    </div>
  </main>

  <!-- 底部導覽 -->
  <nav class="fixed bottom-0 w-full max-w-md bg-white/90 backdrop-blur-xl border-t border-slate-100 flex justify-evenly items-center px-2 py-2 z-40 pb-safe shadow-app-nav left-1/2 -translate-x-1/2 h-[72px]">
    <button class="nav-btn nav-active"><span class="material-symbols-outlined text-[24px]">home</span><span class="text-[10px] mt-1">首頁</span></button>
    <button onclick="alert('我的報名開發中')" class="nav-btn"><span class="material-symbols-outlined text-[24px]">confirmation_number</span><span class="text-[10px] mt-1">票券</span></button>
    <button onclick="alert('個人設定開發中')" class="nav-btn"><span class="material-symbols-outlined text-[24px]">person</span><span class="text-[10px] mt-1">我的</span></button>
  </nav>
</div>

<script>
  const WORKER_URL = 'https://saas.ares-co2026.workers.dev/';
  let p = '', uid = '', allActivities = [], currentFilter = 'all';

  async function init() {
    p = new URLSearchParams(window.location.search).get('p');
    try {
      await liff.init({ liffId: '2009367829-5bIWGL8O' });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      const profile = await liff.getProfile();
      uid = profile.userId;
      loadData();
    } catch (e) { console.error(e); }
  }

  async function loadData() {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'get_service_hub', p, uid })
    });
    const result = await res.json();
    if (result.status === 'success') {
      document.getElementById('store-name').innerText = result.data.storeName;
      if (result.data.isAdmin) document.getElementById('admin-badge').classList.remove('hidden');
      if (result.data.isAdmin) document.getElementById('activity-admin-section').classList.remove('hidden');
      allActivities = result.data.activities || [];
      renderActivities();
    }
  }

  function filterMode(mode) {
    currentFilter = mode;
    ['all', 'quick', 'detailed', 'batch'].forEach(m => {
      document.getElementById('cat-' + m).className = `category-tab ${mode === m ? 'cat-active' : 'cat-inactive'}`;
    });
    renderActivities();
  }

  function renderActivities() {
    const container = document.getElementById('activity-list');
    const filtered = currentFilter === 'all' ? allActivities : allActivities.filter(a => a.mode === currentFilter);
    
    if (filtered.length === 0) {
      container.innerHTML = `<div class="py-20 text-center text-slate-400"><span class="material-symbols-outlined text-5xl mb-2 opacity-20">event_busy</span><p class="text-sm">此分類目前無活動</p></div>`;
      return;
    }

    container.innerHTML = filtered.map(act => {
      const modeLabel = { quick: '快速匯入', detailed: '正式活動', batch: '系列梯次' }[act.mode] || '一般活動';
      return `
        <div class="act-card relative">
          <div class="act-badge">${modeLabel}</div>
          ${act.image ? `<img src="${act.image}" class="act-img">` : `<div class="act-img flex items-center justify-center text-slate-300 text-xs">NO IMAGE</div>`}
          <div class="p-5">
            <h3 class="text-lg font-bold text-slate-800 mb-3">${act.title}</h3>
            <div class="space-y-1.5 mb-4">
              <div class="flex items-center gap-2 text-slate-500 text-[13px]"><span class="material-symbols-outlined text-[16px]">calendar_month</span>${act.start || '時間未定'}</div>
              <div class="flex items-center gap-2 text-slate-500 text-[13px]"><span class="material-symbols-outlined text-[16px]">location_on</span>${act.loc || '地點未定'}</div>
            </div>
            <div class="flex items-center justify-between border-t border-slate-50 pt-4">
              <span class="text-red-500 font-extrabold text-lg">${act.price > 0 ? 'NT$ ' + act.price : '免費參加'}</span>
              <button onclick="alert('報名功能開發中')" class="px-5 py-2 bg-slate-900 text-white text-[13px] font-bold rounded-lg shadow-sm active:scale-95 transition-all">詳情 / 報名</button>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  init();
</script>
</body>
</html>
