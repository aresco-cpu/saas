<div id="toast" class="hidden fixed top-14 left-1/2 -translate-x-1/2 px-5 py-3 rounded text-[15px] shadow-lg transition-all z-[10000] font-bold flex items-center gap-2 w-max max-w-[90vw] opacity-0 pointer-events-none"></div>

<script>
  const LIFF_ID = "2009367829-5bIWGL8O"; 
  const WORKER_URL = "https://saas.ares-co2026.workers.dev/"; 

  let userProfile = null;
  let isProcessing = false;
  let pParam = '';

  function setButtonLoading(btnId, isLoading, originalText = '') {
      const btn = document.getElementById(btnId);
      if (!btn) return false;
      if (isLoading) {
          if (!btn.dataset.oriText) btn.dataset.oriText = btn.innerHTML;
          btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-[18px] align-middle">refresh</span> 處理中...';
          btn.classList.add('opacity-50', 'pointer-events-none');
          return true;
      } else {
          btn.innerHTML = originalText || btn.dataset.oriText || '送出';
          btn.classList.remove('opacity-50', 'pointer-events-none');
          return false;
      }
  }

  function showToast(m, e=false) { 
    const t = document.getElementById('toast'); if(!t) return; 
    t.innerHTML = `<span class="material-symbols-outlined icon-filled">${e?'error':'info'}</span>` + m; 
    t.className = `fixed top-14 left-1/2 -translate-x-1/2 px-5 py-3 rounded text-[15px] shadow-lg transition-all z-[10000] font-bold transform translate-y-0 opacity-100 ${e ? 'bg-red-500 text-white border-red-600' : 'bg-slate-800 text-white border-slate-700'} flex items-center gap-2 w-max max-w-[90vw]`; 
    setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, -1rem)'; }, 3000); 
  }

  window.onload = async () => {
    pParam = new URLSearchParams(window.location.search).get('p');
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      userProfile = await liff.getProfile();
      document.getElementById('user-avatar').src = userProfile.pictureUrl || '';
      document.getElementById('user-profile-badge').classList.remove('hidden');
      
      document.getElementById('view-loading').classList.add('hidden');
      document.getElementById('view-admin-create').classList.remove('hidden');
      
      addBatchItem(); // 初始化第一筆梯次
    } catch (err) { 
      document.getElementById('view-loading').innerHTML = `<p class="text-error font-bold">LIFF 異常：${err.message}</p>`;
    }
  };

  function toggleCreateMode(m) { 
    const tabs = ['quick', 'detailed', 'batch'];
    tabs.forEach(t => {
        const btn = document.getElementById('tab-' + t);
        const form = document.getElementById('form-' + t);
        if (m === t) {
            btn.className = `flex-1 py-2 rounded text-[14px] font-bold transition-all bg-white text-primary shadow-sm border border-slate-200`;
            form.classList.remove('hidden');
        } else {
            btn.className = `flex-1 py-2 rounded text-[14px] font-bold transition-all text-slate-500 hover:text-slate-700 border border-transparent`;
            form.classList.add('hidden');
        }
    });
  }
  
  function toggleFeeInput(modeStr) { 
      document.getElementById(modeStr + '-price').classList.toggle('hidden', document.querySelector('input[name="fee-type"]:checked').value !== '收費'); 
  }
  
  // ================= 梯次動態與複製功能 =================
  function addBatchItem(data = null) {
      const container = document.getElementById('batch-list-container');
      const id = Date.now();
      const name = data ? data.name : '';
      const start = data ? data.start : '';
      const end = data ? data.end : '';
      const loc = data ? data.loc : '';
      const price = data ? data.price : '';

      const html = `
      <div id="batch-item-${id}" class="bg-slate-50 border border-slate-300 rounded p-4 relative animate-in fade-in zoom-in-95 duration-200 shadow-sm">
          <div class="absolute top-2.5 right-2.5 flex gap-2">
            <button onclick="cloneBatchItem(${id})" class="w-8 h-8 flex items-center justify-center text-blue-500 hover:bg-blue-50 transition-colors bg-white border border-slate-200 rounded shadow-sm" title="複製"><span class="material-symbols-outlined text-[18px]">content_copy</span></button>
            <button onclick="removeBatchItem(${id})" class="w-8 h-8 flex items-center justify-center text-slate-400 hover:text-red-500 hover:bg-red-50 transition-colors bg-white border border-slate-200 rounded shadow-sm" title="移除"><span class="material-symbols-outlined text-[19px]">delete</span></button>
          </div>
          <div class="flex flex-col mb-4 pr-20">
              <label class="input-label !text-[13px] !text-slate-600">梯次名稱</label>
              <input type="text" class="custom-input batch-name-input !h-[38px] !text-[14px]" placeholder="例如：第一梯次 (7/1~7/5)" value="${name}">
          </div>
          <div class="grid grid-cols-2 gap-3 mb-4">
              <div class="flex flex-col"><label class="input-label !text-[13px] !text-slate-600">開始時間</label><input type="datetime-local" class="custom-input batch-start-input !h-[38px] !px-2 !text-[13px] text-slate-700" value="${start}"></div>
              <div class="flex flex-col"><label class="input-label !text-[13px] !text-slate-600">結束時間</label><input type="datetime-local" class="custom-input batch-end-input !h-[38px] !px-2 !text-[13px] text-slate-700" value="${end}"></div>
          </div>
          <div class="grid grid-cols-2 gap-3">
              <div class="flex flex-col"><label class="input-label !text-[13px] !text-slate-600">收費 (NT$)</label><input type="number" class="custom-input batch-price-input !h-[38px] !text-[14px]" placeholder="免費留空或0" value="${price}"></div>
              <div class="flex flex-col"><label class="input-label !text-[13px] !text-slate-600">活動地點</label><input type="text" class="custom-input batch-loc-input !h-[38px] !text-[14px]" placeholder="地點/連結" value="${loc}"></div>
          </div>
      </div>
      `;
      container.insertAdjacentHTML('beforeend', html);
  }

  function cloneBatchItem(sourceId) {
      const el = document.getElementById(`batch-item-${sourceId}`);
      const data = {
          name: el.querySelector('.batch-name-input').value,
          start: el.querySelector('.batch-start-input').value,
          end: el.querySelector('.batch-end-input').value,
          price: el.querySelector('.batch-price-input').value,
          loc: el.querySelector('.batch-loc-input').value
      };
      addBatchItem(data);
      showToast("✅ 已複製場次設定");
  }

  function removeBatchItem(id) {
      const item = document.getElementById(`batch-item-${id}`);
      if (item) item.remove();
  }

  function previewFile(mode) { 
    const f = document.getElementById(`file-input-${mode}`).files[0]; 
    if(!f) return; 
    showToast("圖片處理中...", false);
    const r = new FileReader(); 
    r.onloadend = () => { 
      const img = new Image(); 
      img.onload = () => { 
        let w = img.width, h = img.height, max = 800; 
        if(w > max){h=Math.round(h*(max/w)); w=max;} 
        const cvs = document.createElement('canvas'); cvs.width=w; cvs.height=h; 
        const ctx=cvs.getContext('2d'); ctx.fillStyle='#FFF'; ctx.fillRect(0,0,w,h); ctx.drawImage(img,0,0,w,h); 
        
        let quality = 0.8;
        let b64=cvs.toDataURL('image/jpeg', quality); 
        
        while (b64.length > 40000 && quality > 0.1) { quality -= 0.1; b64 = cvs.toDataURL('image/jpeg', quality); }
        if (b64.length > 49000) return showToast("圖片過大", true);
        
        document.getElementById(`image-preview-${mode}`).src=b64; 
        document.getElementById(`image-preview-${mode}`).classList.remove('hidden'); 
        document.getElementById(`preview-placeholder-${mode}`).classList.add('hidden'); 
        const badge = document.getElementById(`upload-badge-${mode}`);
        if(badge) badge.classList.remove('hidden');
        document.getElementById(`in-image-url-${mode}`).value=b64; 
        showToast("✅ 上傳完成");
      }; 
      img.src=r.result; 
    }; 
    r.readAsDataURL(f); 
  }

  // ================= AI 文案優化 =================
  async function aiOptimizeDesc(targetId) {
      const el = document.getElementById(targetId);
      if (!el.value) return showToast("請先輸入簡短大綱，讓 AI 參考", true);
      
      const originalValue = el.value;
      el.value = "🤖 正在請求 AI 優化您的文案中...\n請稍候...";
      
      try {
          const res = await fetch(WORKER_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ action: 'ai_optimize_activity', p: pParam, content: originalValue })
          });
          const text = await res.text();
          el.value = text;
          showToast("✅ AI 優化完成！");
      } catch (err) {
          el.value = originalValue;
          showToast("AI 優化失敗，請稍後再試。", true);
      }
  }

  // ================= 送出表單 =================
  async function handleCreateActivity(mode) { 
    if(isProcessing) return; isProcessing=true; 
    const btnId = `btn-${mode}-create`;
    const btnHtml = document.getElementById(btnId).innerHTML;
    setButtonLoading(btnId, true);
    
    let payload = { 
        action: 'create_activity',
        p: pParam,
        uid: userProfile?.userId || '',
        mode: mode,
        name: '', type: '', identity: '', start: '', end: '', loc: '', desc: '', price: '', image: '', names: [], sessions: []
    }; 
    
    if(mode === 'quick') {
        payload.name = document.getElementById('quick-name').value.trim();
        payload.type = document.getElementById('quick-type').value;
        payload.identity = document.getElementById('quick-identity').value;
        payload.names = document.getElementById('quick-names').value.split('\n').filter(n=>n.trim()); 
        payload.image = document.getElementById('in-image-url-quick').value;
        payload.start = document.getElementById('quick-start').value;
        payload.loc = document.getElementById('quick-loc').value;
    } else if(mode === 'detailed') { 
        payload.name = document.getElementById('detail-name').value.trim();
        payload.type = document.getElementById('detail-type').value;
        payload.identity = document.getElementById('detail-identity').value;
        payload.price = document.getElementById('detail-price').value; 
        payload.start = document.getElementById('detail-start').value; 
        payload.end = document.getElementById('detail-end').value; 
        payload.desc = document.getElementById('detail-desc').value; 
        payload.image = document.getElementById('in-image-url-create').value; 
    } else if(mode === 'batch') {
        payload.name = document.getElementById('batch-name').value.trim();
        payload.type = document.getElementById('batch-type').value;
        payload.identity = document.getElementById('batch-identity').value;
        payload.desc = document.getElementById('batch-desc').value;
        payload.image = document.getElementById('in-image-url-batch').value;
        
        const container = document.getElementById('batch-list-container');
        const items = container.querySelectorAll('[id^="batch-item-"]');
        items.forEach(item => {
            payload.sessions.push({
                name: item.querySelector('.batch-name-input').value.trim(),
                time: item.querySelector('.batch-start-input').value, // 對接後端的 time 欄位
                loc: item.querySelector('.batch-loc-input').value
            });
        });
    }
    
    if(!payload.name) { isProcessing=false; setButtonLoading(btnId, false, btnHtml); return showToast("活動名稱/標題為必填", true); }

    if (mode === 'batch') {
        if (payload.sessions.length === 0) {
            isProcessing=false; setButtonLoading(btnId, false, btnHtml); return showToast("至少需新增一個梯次", true);
        }
        for(let b of payload.sessions) {
            if(!b.name) {
                isProcessing=false; setButtonLoading(btnId, false, btnHtml); return showToast("所有梯次名稱皆為必填", true);
            }
        }
    }
    
    try { 
      const response = await fetch(WORKER_URL, { 
          method: 'POST', 
          headers: { 'Content-Type': 'application/json' }, 
          body: JSON.stringify(payload) 
      });
      const result = await response.json();
      if(result.status === 'success') {
          showToast("✅ 活動建立成功！"); 
          setTimeout(()=> window.location.href = 'service_hub.html?p=' + pParam, 1200); 
      } else {
          throw new Error(result.message);
      }
    } catch(e){
      showToast("發生錯誤：" + e.message, true);
    } finally{ 
      isProcessing=false; setButtonLoading(btnId, false, btnHtml); 
    }
  }
</script>
