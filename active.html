<!-- Version: v1.1.4 (報名大師 SaaS 穩定版 - 嚴格遵循無粗體、無包框、支援複製梯次) -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <title>建立活動</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <script>
    window.tailwind = window.tailwind || {};
    window.tailwind.config = {
      theme: {
        extend: {
          colors: { primary: "#06C755", "text-main": "#111111", "text-muted": "#8e8e93", link: "#007aff" }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Noto Sans TC', sans-serif; background-color: #ffffff; color: #111; -webkit-font-smoothing: antialiased; }
    .nav-tabs { display: flex; border-bottom: 1px solid #f2f2f2; position: sticky; top: 0; background: #fff; z-index: 30; }
    .tab { flex: 1; text-align: center; padding: 14px 0; font-size: 14px; color: #8e8e93; cursor: pointer; border-bottom: 2px solid transparent; }
    .tab-active { color: #06C755; border-bottom-color: #06C755; font-weight: 400; }
    
    /* LINE 原生風格：極簡底線、無包框、無粗體 */
    .row-item { padding: 12px 20px; border-bottom: 1px solid #f8f8f8; display: flex; align-items: center; min-height: 52px; }
    .row-label { width: 85px; font-size: 14px; color: #111; flex-shrink: 0; font-weight: 400; }
    .row-input { flex: 1; border: none; font-size: 15px; outline: none; padding: 0; background: transparent; color: #111; font-weight: 400; }
    .row-input::placeholder { color: #c7c7cc; }

    .textarea-box { width: 100%; padding: 15px 20px; border-bottom: 1px solid #f8f8f8; font-size: 14px; outline: none; resize: none; background: #fdfdfd; font-weight: 400; }
    
    .btn-main { width: 100%; padding: 18px; background-color: #06C755; color: #fff; font-size: 16px; border: none; position: fixed; bottom: 0; left: 0; z-index: 40; font-weight: 400; }
    .btn-main:disabled { background-color: #c7c7cc; }

    .img-upload { padding: 20px; text-align: center; border-bottom: 1px solid #f8f8f8; cursor: pointer; }
    .img-prev { width: 100%; height: 160px; object-fit: cover; border-radius: 4px; display: none; margin-bottom: 10px; }
    .img-hint { font-size: 13px; color: #007aff; }

    .batch-item { padding: 15px 20px; border-bottom: 1px solid #f2f2f2; position: relative; background: #fcfcfc; }
    .batch-actions { position: absolute; right: 20px; top: 15px; display: flex; gap: 15px; }
    .batch-btn { font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 2px; font-weight: 400; }
    .btn-copy { color: #007aff; }
    .btn-remove { color: #ff3b30; }
    
    .batch-add { color: #007aff; font-size: 14px; padding: 16px; cursor: pointer; text-align: center; border-bottom: 1px solid #f8f8f8; font-weight: 400; }

    .hidden { display: none !important; }
  </style>
</head>
<body class="pb-24">

<div id="app" class="max-w-md mx-auto">
  <nav class="nav-tabs">
    <div onclick="switchTab('quick')" id="tab-quick" class="tab tab-active">快速上架</div>
    <div onclick="switchTab('formal')" id="tab-formal" class="tab">正式規格</div>
    <div onclick="switchTab('batch')" id="tab-batch" class="tab">系列梯次</div>
  </nav>

  <main>
    <section id="form-quick">
      <div class="row-item">
        <span class="row-label">活動名稱</span>
        <input type="text" id="q-name" class="row-input" placeholder="例：第 88 次例會">
      </div>
      <div class="row-item">
        <span class="row-label">活動類型</span>
        <select id="q-type" class="row-input">
          <option>例會</option><option>課程</option><option>聯誼</option><option>參訪</option><option>講座</option><option>其他</option>
        </select>
      </div>
      <div class="row-item">
        <span class="row-label">開始時間</span>
        <input type="datetime-local" id="q-start" class="row-input text-gray-500">
      </div>
      <div class="px-5 py-4 border-b border-gray-50">
        <div class="text-[12px] text-gray-400 mb-2">匯入名單 (每行姓名)</div>
        <textarea id="q-names" class="w-full h-40 text-sm outline-none resize-none" placeholder="王小明&#10;李大華..."></textarea>
      </div>
    </section>

    <section id="form-formal" class="hidden">
      <div onclick="document.getElementById('file-formal').click()" class="img-upload">
        <img id="prev-formal" class="img-prev">
        <div id="hint-formal" class="img-hint">+ 選擇封面圖片</div>
        <input type="file" id="file-formal" class="hidden" accept="image/*" onchange="handleImg(this, 'formal')">
        <input type="hidden" id="img-formal">
      </div>
      <div class="row-item">
        <span class="row-label">活動標題</span>
        <input type="text" id="f-name" class="row-input">
      </div>
      <div class="row-item">
        <span class="row-label">費用</span>
        <input type="number" id="f-price" class="row-input" placeholder="0 為免費">
      </div>
      <div class="px-5 py-4 border-b border-gray-50">
        <div class="text-[11px] text-link float-right" onclick="aiBoost('f-desc')">🤖 AI 優化</div>
        <div class="text-[12px] text-gray-400 mb-2">詳細介紹</div>
        <textarea id="f-desc" class="w-full h-32 text-sm outline-none resize-none"></textarea>
      </div>
    </section>

    <section id="form-batch" class="hidden">
      <div class="row-item">
        <span class="row-label">系列標題</span>
        <input type="text" id="b-name" class="row-input" placeholder="例：AI 轉型實戰班">
      </div>
      <div class="px-5 py-3 border-b border-gray-50">
        <div class="text-[12px] text-gray-400 mb-2">系列介紹</div>
        <textarea id="b-desc" class="w-full h-24 text-sm outline-none resize-none"></textarea>
      </div>
      <div id="batch-container"></div>
      <div class="batch-add" onclick="addBatchRow()">+ 新增一個空白梯次</div>
    </section>
  </main>

  <button onclick="submit()" id="btn-submit" class="btn-main">確認並發布活動</button>
</div>

<script>
  const LIFF_ID = '2009367829-5bIWGL8O';
  const WORKER_URL = 'https://saas.ares-co2026.workers.dev/';
  let p = '', uid = '', currentMode = 'quick';

  async function init() {
    const params = new URLSearchParams(window.location.search);
    p = params.get('p');
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      const profile = await liff.getProfile();
      uid = profile.userId;
      addBatchRow();
    } catch (e) { console.error('LIFF Error', e); }
  }

  function switchTab(m) {
    currentMode = m;
    ['quick', 'formal', 'batch'].forEach(t => {
      document.getElementById('tab-' + t).classList.toggle('tab-active', t === m);
      document.getElementById('form-' + t).classList.toggle('hidden', t !== m);
    });
  }

  function addBatchRow(data = null) {
    const id = Date.now();
    const name = data ? data.name : '';
    const time = data ? data.time : '';
    const loc = data ? data.loc : '';

    const html = `
      <div id="batch-${id}" class="batch-item">
        <div class="batch-actions">
          <div class="batch-btn btn-copy" onclick="cloneBatch('${id}')">
            <span class="material-symbols-outlined text-[14px]">content_copy</span>複製
          </div>
          <div class="batch-btn btn-remove" onclick="document.getElementById('batch-${id}').remove()">
            <span class="material-symbols-outlined text-[14px]">delete</span>移除
          </div>
        </div>
        <div class="flex items-center mb-2">
          <span class="text-[12px] text-gray-400 w-20">梯次名稱</span>
          <input type="text" class="b-sub-name row-input !text-sm" placeholder="第一梯次" value="${name}">
        </div>
        <div class="flex items-center mb-2">
          <span class="text-[12px] text-gray-400 w-20">開始時間</span>
          <input type="datetime-local" class="b-sub-time row-input !text-[12px]" value="${time}">
        </div>
        <div class="flex items-center">
          <span class="text-[12px] text-gray-400 w-20">活動地點</span>
          <input type="text" class="b-sub-loc row-input !text-sm" placeholder="未定" value="${loc}">
        </div>
      </div>`;
    document.getElementById('batch-container').insertAdjacentHTML('beforeend', html);
  }

  function cloneBatch(sourceId) {
    const sourceEl = document.getElementById(`batch-${sourceId}`);
    const data = {
      name: sourceEl.querySelector('.b-sub-name').value,
      time: sourceEl.querySelector('.b-sub-time').value,
      loc: sourceEl.querySelector('.b-sub-loc').value
    };
    addBatchRow(data);
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }

  function handleImg(input, mode) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > 800) { h = Math.round(h * (800 / w)); w = 800; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const b64 = canvas.toDataURL('image/jpeg', 0.7);
        document.getElementById('prev-'+mode).src = b64;
        document.getElementById('prev-'+mode).style.display = 'block';
        document.getElementById('hint-'+mode).classList.add('hidden');
        document.getElementById('img-'+mode).value = b64;
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  async function aiBoost(id) {
    const el = document.getElementById(id);
    if(!el.value) return;
    const res = await fetch(WORKER_URL, { 
      method: 'POST', 
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'ai_optimize_activity', p, content: el.value }) 
    });
    el.value = await res.text();
  }

  async function submit() {
    const btn = document.getElementById('btn-submit');
    const oldText = btn.innerText;
    btn.innerText = '處理中...'; btn.disabled = true;

    let payload = { action: 'create_activity', mode: currentMode, p, uid };

    try {
      if (currentMode === 'quick') {
        payload.name = document.getElementById('q-name').value;
        payload.start = document.getElementById('q-start').value;
        payload.names = document.getElementById('q-names').value.split('\n').filter(n => n.trim());
      } else if (currentMode === 'formal') {
        payload.name = document.getElementById('f-name').value;
        payload.price = document.getElementById('f-price').value;
        payload.desc = document.getElementById('f-desc').value;
        payload.image = document.getElementById('img-formal').value;
      } else {
        payload.name = document.getElementById('b-name').value;
        payload.desc = document.getElementById('b-desc').value;
        payload.sessions = Array.from(document.querySelectorAll('.batch-item')).map(item => ({
          name: item.querySelector('.b-sub-name').value,
          time: item.querySelector('.b-sub-time').value,
          loc: item.querySelector('.b-sub-loc').value
        }));
      }

      if(!payload.name) throw new Error('標題不能為空');

      const response = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      
      const result = await response.json();
      alert(result.message);
      if(result.status === 'success') location.href = 'service_hub.html?p=' + p;
    } catch(e) { 
      alert(e.message || '連線異常'); 
    } finally {
      btn.innerText = oldText; btn.disabled = false;
    }
  }

  init();
</script>
</body>
</html>
